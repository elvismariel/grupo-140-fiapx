name: CI/CD Pipeline

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push fiapx-api image
              uses: docker/build-push-action@v5
              with:
                  context: ./fiapx-api
                  file: ./fiapx-api/Dockerfile
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/fiapx-api:latest

            - name: Build and push fiapx-worker image
              uses: docker/build-push-action@v5
              with:
                  context: ./fiapx-worker
                  file: ./fiapx-worker/Dockerfile
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/fiapx-worker:latest
